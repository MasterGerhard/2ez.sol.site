<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lovey Bunny's Fruit Catch!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{
    width:100%;height:100%;
    background:#1a0a2e;
    overflow:hidden;
    font-family:'Nunito',sans-serif;
  }
  body{
    /* simple fixed fullscreen container — no flex tricks */
    position:fixed;inset:0;margin:0;padding:0;
  }

  #stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

  /* scale-root sits dead-centre; transform handles the rest */
  #scale-root{
    position:absolute;
    top:50%;left:50%;
    transform-origin:center center;
    /* width/height set by JS to the native game size */
    z-index:1;
  }

  #game-wrapper{
    display:flex;flex-direction:column;align-items:center;
    gap:12px;
    width:420px;
  }

  #hud{
    display:flex;align-items:center;gap:20px;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.15);
    border-radius:16px;
    padding:10px 24px;
    width:420px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .hud-item{
    display:flex;flex-direction:column;align-items:center;
    gap:2px;
  }
  .hud-label{
    font-family:'Press Start 2P',monospace;
    font-size:7px;color:rgba(255,255,255,0.5);
    letter-spacing:.08em;
  }
  .hud-value{
    font-family:'Press Start 2P',monospace;
    font-size:13px;color:#fff;
  }
  .hud-value.score-val{color:#FFE066;}
  .hud-value.lives-val{color:#FF8FAB;}
  .hud-value.level-val{color:#80E9FF;}
  .hud-value.combo-val{color:#B5FFB5;}

  #level-bar-wrap{
    width:420px;
    background:rgba(255,255,255,0.08);
    border-radius:8px;
    height:10px;
    border:1px solid rgba(255,255,255,0.1);
    overflow:hidden;
  }
  #level-bar{
    height:100%;background:linear-gradient(90deg,#4FC8FF,#A78BFA);
    border-radius:8px;transition:width .3s ease;
    width:0%;
  }

  #canvas-wrap{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 60px rgba(167,139,250,0.3),0 0 120px rgba(79,200,255,0.1);
    border:3px solid rgba(255,255,255,0.12);
  }

  #gameCanvas{
    display:block;
    background:transparent;
    image-rendering:pixelated;
  }

  #overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:transparent;
    border-radius:17px;
    z-index:10;
    gap:10px;
    padding:24px;
  }

  #idleCanvas{
    border-radius:50%;
    box-shadow:0 0 0 3px rgba(240,200,200,0.25), 0 0 20px rgba(240,180,200,0.3);
    background:rgba(255,255,255,0.04);
  }

  .overlay-title{
    font-family:'Press Start 2P',monospace;
    font-size:14px;color:#FFE066;
    text-align:center;line-height:1.8;
    text-shadow:0 0 20px rgba(255,224,102,0.5);
  }
  .overlay-sub{
    font-family:'Press Start 2P',monospace;
    font-size:9px;color:#80E9FF;
    text-align:center;line-height:2;
  }
  .overlay-desc{
    font-size:14px;color:rgba(255,255,255,0.7);
    text-align:center;line-height:1.8;max-width:300px;
  }
  .overlay-score{
    font-family:'Press Start 2P',monospace;
    font-size:14px;color:#FFE066;
  }

  .btn{
    font-family:'Press Start 2P',monospace;
    font-size:11px;
    background:linear-gradient(135deg,#A78BFA,#4FC8FF);
    border:none;border-radius:12px;
    color:#fff;padding:14px 32px;
    cursor:pointer;
    box-shadow:0 4px 20px rgba(167,139,250,0.4);
    transition:transform .1s,box-shadow .1s;
    letter-spacing:.05em;
  }
  .btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(167,139,250,0.6);}
  .btn:active{transform:scale(0.97);}
  .btn-secondary{
    background:linear-gradient(135deg,#4a4a7a,#2a3a5a);
    box-shadow:0 4px 20px rgba(80,80,160,0.3);
    font-size:9px;
    padding:14px 18px;
  }
  .btn-secondary:hover{box-shadow:0 6px 30px rgba(80,80,160,0.5);}

  .lives-display{font-size:18px;letter-spacing:4px;}

  .fruit-legend{
    display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
    margin:4px 0;
  }
  .fruit-legend-item{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:rgba(255,255,255,0.75);
  }

  #combo-pop{
    position:absolute;
    font-family:'Press Start 2P',monospace;
    font-size:16px;color:#B5FFB5;
    pointer-events:none;
    opacity:0;
    transition:opacity .1s;
    text-shadow:0 0 10px #B5FFB5;
    top:40%;left:50%;transform:translateX(-50%);
  }

  .level-announce{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(10,4,30,0.75);
    border-radius:17px;
    pointer-events:none;
    opacity:0;
    z-index:9;
    flex-direction:column;gap:12px;
  }
  .level-announce.show{animation:levelFlash 1.5s forwards;}
  @keyframes levelFlash{
    0%{opacity:0;transform:scale(.8);}
    20%{opacity:1;transform:scale(1.05);}
    70%{opacity:1;}
    100%{opacity:0;}
  }
  .level-announce-txt{
    font-family:'Press Start 2P',monospace;
    font-size:24px;color:#FFE066;
    text-shadow:0 0 30px #FFE066;
  }
  .level-announce-sub{
    font-family:'Press Start 2P',monospace;
    font-size:10px;color:#80E9FF;
  }

  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
</style>
</head>
<body>

<canvas id="stars" width="1" height="1"></canvas>

<div id="scale-root">
<div id="game-wrapper">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value score-val" id="scoreDisplay">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value level-val" id="levelDisplay">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span class="hud-value lives-val" id="livesDisplay">♥ ♥ ♥</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">COMBO</span>
      <span class="hud-value combo-val" id="comboDisplay">x1</span>
    </div>
  </div>

  <div id="level-bar-wrap"><div id="level-bar"></div></div>

  <div id="canvas-wrap">
    <canvas id="gameCanvas" width="420" height="540"></canvas>
    <div id="combo-pop"></div>
    <div class="level-announce" id="levelAnnounce">
      <div class="level-announce-txt" id="levelAnnounceTxt">LEVEL 2</div>
      <div class="level-announce-sub" id="levelAnnounceSub">THINGS HEAT UP!</div>
    </div>
    <div id="overlay">
      <canvas id="idleCanvas" width="96" height="96" style="image-rendering:pixelated;display:block;"></canvas>
      <div class="overlay-title" id="overlayTitle">LOVEY BUNNY'S<br>FRUIT CATCH!</div>
      <div class="overlay-desc" id="overlayDesc">
        Move left &amp; right to catch falling fruit!<br><br>
        <b>← → Arrow keys</b> or <b>A / D</b><br>
        Watch out for bombs 💣
      </div>
      <div class="fruit-legend" id="fruitLegend">
        <canvas id="leg-apple" width="20" height="20" style="image-rendering:pixelated"></canvas><span class="fruit-legend-item">+10</span>
        <canvas id="leg-orange" width="20" height="20" style="image-rendering:pixelated"></canvas><span class="fruit-legend-item">+15</span>
        <canvas id="leg-grapes" width="20" height="20" style="image-rendering:pixelated"></canvas><span class="fruit-legend-item">+20</span>
        <canvas id="leg-strawberry" width="20" height="20" style="image-rendering:pixelated"></canvas><span class="fruit-legend-item">+25</span>
        <canvas id="leg-star" width="20" height="20" style="image-rendering:pixelated"></canvas><span class="fruit-legend-item">+50</span>
        <canvas id="leg-bomb" width="20" height="20" style="image-rendering:pixelated"></canvas><span class="fruit-legend-item">-♥</span>
      </div>
      <div id="btn-row" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="btn" id="startBtn" onclick="startGame()">START GAME</button>
        <button class="btn btn-secondary" id="returnBtn" onclick="returnToStart()" style="display:none;">🏠 MENU</button>
      </div>
    </div>
  </div>
</div>
</div><!-- #scale-root -->

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// roundRect polyfill for older Safari / WebKit
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r);
    this.closePath();
    return this;
  };
}

// Stars background
function drawStars(){
  const sc=document.getElementById('stars');
  sc.width=window.innerWidth;sc.height=window.innerHeight;
  const sx=sc.getContext('2d');
  for(let i=0;i<200;i++){
    const x=Math.random()*sc.width,y=Math.random()*sc.height;
    const r=Math.random()*1.5;
    sx.beginPath();sx.arc(x,y,r,0,Math.PI*2);
    sx.fillStyle=`rgba(255,255,255,${Math.random()*0.7+0.1})`;sx.fill();
  }
}
drawStars();

// --- Responsive scaling ---
// The canvas stays at its native 420x540 logical size.
// We scale the entire #scale-root wrapper to fit the visible viewport.
const NATIVE_W = 420;
const NATIVE_H = 540;  // canvas only; total includes HUD (~80px) + bar (~22px) + gaps (~24px)
const CHROME_H  = 140; // estimated height of HUD + bar + gaps above canvas

function applyScale(){
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const totalNativeH = NATIVE_H + CHROME_H;
  // Fit inside viewport with small padding, never upscale on desktop
  const scale = Math.min((vw - 8) / NATIVE_W, (vh - 8) / totalNativeH, 1);
  const root  = document.getElementById('scale-root');
  // Fix the element's own layout size to the native dimensions
  root.style.width  = NATIVE_W + 'px';
  root.style.height = totalNativeH + 'px';
  // translate(-50%,-50%) centres the top-left on the body's 50%/50% anchor,
  // then scale() shrinks in-place. No margin math needed.
  root.style.transform = 'translate(-50%,-50%) scale(' + scale + ')';
}

applyScale();

// Debounce so we don't fire 20x during the iOS resize storm
let _resizeTimer;
function onResize(){
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(()=>{ applyScale(); drawStars(); }, 80);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', function(){
  // iOS fires orientationchange BEFORE the viewport updates; wait a tick
  setTimeout(applyScale, 120);
});
// Extra safety net: visualViewport fires reliably on iOS Safari
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', onResize);
}

// --- Pixel palette ---
const T='rgba(0,0,0,0)';
const WH='#F5F0E8', W2='#E8E0D0', W3='#D4C9B5';
const PK='#F0C8C8', BK='#2A2420', OR='#E8621A';
const GN='#5A9E3A', GN2='#3D7A22', NS='#D4968A';
const SH='#C8BDA8', MO='#B07868';

// --- Lovey Bunny 32x32 pixel art builder ---
function buildBunny32(){
  const g=[];
  for(let i=0;i<32;i++)g.push(new Array(32).fill(T));
  function set(x,y,c){if(y>=0&&y<32&&x>=0&&x<32)g[y][x]=c;}
  function rect(x,y,w,h,c){for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)set(x+dx,y+dy,c);}
  function circle(cx,cy,r,c){
    for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)
      if(dx*dx+dy*dy<=r*r)set(cx+dx,cy+dy,c);
  }
  // Left ear
  set(8,0,W2);set(8,1,WH);set(8,2,WH);set(9,1,W2);
  set(7,2,WH);set(7,3,WH);set(7,4,W2);
  set(8,3,WH);set(8,4,WH);
  set(6,4,WH);set(6,5,W2);set(7,5,WH);
  set(5,5,W2);set(5,6,W2);
  set(6,6,WH);set(6,7,W2);
  set(7,2,PK);set(7,3,PK);set(7,4,PK);
  set(6,5,PK);set(6,6,PK);
  // Right ear
  set(22,0,W2);set(22,1,WH);set(22,2,WH);set(21,1,W2);
  set(23,2,WH);set(23,3,WH);set(23,4,W2);
  set(22,3,WH);set(22,4,WH);
  set(24,4,WH);set(24,5,W2);set(23,5,WH);
  set(25,5,W2);set(25,6,W2);
  set(24,6,WH);set(24,7,W2);
  set(23,2,PK);set(23,3,PK);set(23,4,PK);
  set(24,5,PK);set(24,6,PK);
  // Head
  circle(15,11,7,WH);
  for(let y=8;y<16;y++){set(8,y,W2);set(22,y,W2);}
  // Eyes
  rect(11,10,2,2,BK);rect(18,10,2,2,BK);
  set(11,10,WH);set(18,10,WH);
  // Nose
  rect(14,13,3,2,NS);set(15,14,BK);
  // W-mouth
  set(12,15,MO);set(18,15,MO);
  set(11,16,MO);set(13,16,MO);set(17,16,MO);set(19,16,MO);
  set(10,17,MO);set(14,17,MO);set(16,17,MO);set(20,17,MO);
  // Body
  circle(15,22,8,WH);
  for(let x=7;x<=23;x++)set(x,29,SH);
  for(let x=8;x<=22;x++)set(x,30,SH);
  for(let y=16;y<=29;y++){set(7,y,W2);set(23,y,W2);}
  // Arms raised (holding basket) - override
  rect(4,16,4,5,WH);rect(4,20,4,1,W2); // left arm up
  rect(24,16,4,5,WH);rect(24,20,4,1,W2); // right arm up
  // Carrot tucked in right arm (she never puts it down!)
  // Orange body angled downward from right paw
  set(27,14,GN2);set(28,13,GN);set(29,12,GN);set(28,14,GN2); // leafy top
  set(27,15,OR);set(28,15,OR);
  set(26,16,OR);set(27,16,'#F07820');
  set(25,17,OR);set(26,17,'#F07820');
  set(25,18,'#C04010');set(26,18,OR);
  set(25,19,OR);
  set(24,20,'#C04010');
  // Feet
  rect(8,28,5,3,WH);rect(8,30,5,1,W2);
  rect(19,28,5,3,WH);rect(19,30,5,1,W2);
  // Tail
  rect(21,24,3,3,W2);set(22,24,WH);set(22,25,WH);
  // Tummy spot
  circle(15,22,3,W2);
  return g;
}

// Draw pixel grid to canvas ctx at position (px,py) scaled by s
function drawPixels(pixels, px, py, s){
  const rows=pixels.length;
  for(let y=0;y<rows;y++){
    const row=pixels[y];
    for(let x=0;x<row.length;x++){
      const c=row[x];
      if(c===T||c==='rgba(0,0,0,0)')continue;
      ctx.fillStyle=c;
      ctx.fillRect(px+Math.floor(x*s), py+Math.floor(y*s), Math.ceil(s), Math.ceil(s));
    }
  }
}

const bunnyPixels = buildBunny32();

// --- Basket pixel art 20x12 ---
function buildBasket(){
  const g=[];
  const BR='#8B5E3C', BR2='#6B4423', YL='#F5D76E', YL2='#E8C444', LN='#D4A830';
  for(let i=0;i<12;i++)g.push(new Array(20).fill(T));
  function set(x,y,c){if(y>=0&&y<12&&x>=0&&x<20)g[y][x]=c;}
  function rect(x,y,w,h,c){for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++)set(x+dx,y+dy,c);}
  // rim
  rect(0,0,20,2,YL);
  rect(0,0,20,1,YL2);
  set(0,0,T);set(1,0,YL2);set(18,0,YL2);set(19,0,T);
  // sides taper
  rect(1,2,18,8,BR);
  // weave pattern
  for(let row=2;row<10;row+=2){
    for(let col=(row%4===0?1:0);col<18;col+=2)set(col+1,row,BR2);
  }
  for(let row=3;row<10;row+=2){
    for(let col=(row%4===1?0:1);col<18;col+=2)set(col+1,row,BR2);
  }
  // bottom
  rect(2,10,16,2,BR2);
  rect(3,11,14,1,BR);
  // taper sides
  for(let y=2;y<10;y++){
    const taper=Math.floor(y/6);
    for(let t=0;t<taper;t++){set(t,y,T);set(19-t,y,T);}
  }
  set(1,8,T);set(18,8,T);
  set(1,9,T);set(18,9,T);
  set(2,10,T);set(17,10,T);
  return g;
}
const basketPixels=buildBasket();

// --- Pixel art fruit sprites (12x12 native) ---
function mkApple(){
  const R='#D32F2F',R2='#B71C1C',HL='#EF9A9A',GN='#388E3C',BR='#5D4037';
  return [
    [T,T,T,T,T,BR,T,T,T,T,T,T],
    [T,T,T,T,T,GN,GN,T,T,T,T,T],
    [T,T,R,R,R,R,R,R,R,T,T,T],
    [T,R,R,HL,HL,R,R,R,R,R,T,T],
    [T,R,HL,R,R,R,R,R,R,R,T,T],
    [T,R,R,R,R,R,R,R,R,R,T,T],
    [T,R,R,R,R,R,R,R,R,R,T,T],
    [T,R,R,R,R,R,R,R,R,R,T,T],
    [T,T,R,R,R,R2,R2,R,R,T,T,T],
    [T,T,T,R,R2,R2,R2,R,T,T,T,T],
    [T,T,T,T,R,R,R,T,T,T,T,T],
    [T,T,T,T,T,T,T,T,T,T,T,T],
  ];
}
function mkOrange(){
  const O='#F57C00',O2='#E65100',HL='#FFB74D',GN='#388E3C';
  return [
    [T,T,T,T,T,T,GN,T,T,T,T,T],
    [T,T,T,O,O,O,O,O,O,T,T,T],
    [T,T,O,O,HL,HL,O,O,O,O,T,T],
    [T,O,O,HL,O,O,O,O,O,O,O,T],
    [T,O,O,O,O,O,O,O,O,O,O,T],
    [T,O,O,O,O,O,O,O,O,O,O,T],
    [T,O,O,O,O,O,O,O,O,O,O,T],
    [T,O,O,O,O,O,O,O,O,O,O,T],
    [T,T,O,O,O,O2,O2,O,O,O,T,T],
    [T,T,T,O,O2,O2,O,O,O,T,T,T],
    [T,T,T,T,O,O,O,O,T,T,T,T],
    [T,T,T,T,T,T,T,T,T,T,T,T],
  ];
}
function mkGrapes(){
  const P='#7B1FA2',P2='#4A148C',HL='#CE93D8',GN='#388E3C',BR='#5D4037';
  return [
    [T,T,T,T,T,BR,GN,T,T,T,T,T],
    [T,T,T,P,P,T,GN,P,P,T,T,T],
    [T,T,P,HL,P,T,T,P,HL,P,T,T],
    [T,T,P,P,P,P,P,P,P,P,T,T],
    [T,T,T,P,P,P2,P2,P,P,T,T,T],
    [T,T,T,P,P,P,P,P,P,T,T,T],
    [T,T,T,T,P,P,P,P,T,T,T,T],
    [T,T,T,P,P,T,T,P,P,T,T,T],
    [T,T,P,HL,P,T,T,P,HL,P,T,T],
    [T,T,P,P,P,T,T,P,P,P,T,T],
    [T,T,T,P,T,T,T,T,P,T,T,T],
    [T,T,T,T,T,T,T,T,T,T,T,T],
  ];
}
function mkStrawberry(){
  const R='#C62828',R2='#B71C1C',HL='#EF9A9A',GN='#388E3C',YL='#F9A825';
  return [
    [T,T,T,GN,GN,GN,GN,GN,T,T,T,T],
    [T,T,T,GN,T,GN,T,GN,T,T,T,T],
    [T,T,R,R,R,R,R,R,R,T,T,T],
    [T,R,R,HL,R,YL,R,HL,R,R,T,T],
    [T,R,R,R,YL,R,YL,R,R,R,T,T],
    [T,R,R,R,R,R,R,R,R,R,T,T],
    [T,R,YL,R,R,R,R,R,YL,R,T,T],
    [T,T,R,R,R,R,R,R,R,T,T,T],

function getLevelCfg(){return LEVELS[Math.min(level-1,LEVELS.length-1)];}

function spawnItem(){
  const cfg=getLevelCfg();
  const isBomb=Math.random()<cfg.bombChance;
  let fruit;
  if(isBomb){fruit=BOMB;}
  else{
    const pool=FRUITS.slice(0,cfg.fruits);
    // stars are rarer — FRUITS[5] is the star (index 5)
    const r=Math.random();
    if(r>0.97){fruit=FRUITS[5];}
    else{fruit=pool[Math.floor(Math.random()*Math.min(pool.length,5))];}
  }
  const x=24+Math.random()*(W-48);
  items.push({
    x, y:-24, size:28,
    vy:cfg.speed+(Math.random()-.5)*0.5,
    vx:(Math.random()-.5)*0.6,
    rot:0, rotv:(Math.random()-.5)*.08,
    ...fruit,
    id:Math.random()
  });
}

function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=1+Math.random()*3;
    particles.push({
      x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      color,life:1,size:3+Math.random()*4,
    });
  }
}

const SKY_COLORS=[
  ['#1a2a6c','#2d5a8e','#b21f1f'], // L1 sunny garden
  ['#0f2027','#203a43','#2c5364'], // L2 windy orchard
  ['#12100e','#2b4162','#12100e'], // L3 rainy meadow

function drawBackground(){
  const idx=Math.min(level-1,7);
  const [c1,c2,c3]=SKY_COLORS[idx];
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,c1);
  grd.addColorStop(.5,c2);
  grd.addColorStop(1,c3);
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fillRect(0,H-30,W,30);
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.fillRect(0,H-8,W,8);

  // Floating clouds / decoration per level
  drawLevelDecor();
}

let cloudOffset=0;
function drawLevelDecor(){
  cloudOffset=(cloudOffset+0.2)%W;
  ctx.save();
  ctx.globalAlpha=0.07;
  ctx.fillStyle='#ffffff';
  const clouds=[{x:80,y:60,r:30},{x:220,y:40,r:22},{x:350,y:80,r:28}];
  clouds.forEach(c=>{
    const cx=(c.x+cloudOffset)%W;
    ctx.beginPath();ctx.arc(cx,c.y,c.r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+c.r*.7,c.y-c.r*.3,c.r*.6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-c.r*.6,c.y-c.r*.2,c.r*.55,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();

  // Level 5: rainbow arcs
  if(level===5){
    ctx.save();
    const colors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#A855F7'];
    colors.forEach((c,i)=>{
      ctx.strokeStyle=c;ctx.lineWidth=4;ctx.globalAlpha=0.12;
      ctx.beginPath();ctx.arc(W/2,H+40,180+i*22,Math.PI,0);ctx.stroke();
    });
    ctx.restore();
  }
  // Level 6: crystal blue sparkles
  if(level===6){
    ctx.save();
    const t=Date.now()/1000;
    for(let i=0;i<12;i++){
      const sx=((i*73+t*18)%W);
      const sy=((i*57+t*11)%H);
      const a=0.5+0.5*Math.sin(t*3+i);
      ctx.globalAlpha=a*0.25;
      ctx.fillStyle='#80CFFF';
      ctx.fillRect(sx,sy,2,2);ctx.fillRect(sx+1,sy-1,1,3);ctx.fillRect(sx-1,sy+1,3,1);
    }
    ctx.restore();
  }
  // Level 7: lava glow at bottom
  if(level===7){
    ctx.save();
    const t=Date.now()/600;
    const grd=ctx.createLinearGradient(0,H-60,0,H);
    grd.addColorStop(0,'rgba(0,0,0,0)');
    grd.addColorStop(0.5,`rgba(255,${60+Math.floor(20*Math.sin(t))},0,0.15)`);
    grd.addColorStop(1,`rgba(255,${80+Math.floor(30*Math.sin(t+1))},0,0.3)`);
    ctx.fillStyle=grd;
    ctx.fillRect(0,H-60,W,60);
    ctx.restore();
  }
  // Level 8: stars and planets
  if(level===8){
    ctx.save();
    const t=Date.now()/2000;
    for(let i=0;i<30;i++){
      const sx=(i*137.5)%W;
      const sy=(i*93.7)%H;
      const a=0.4+0.4*Math.sin(t*2+i);
      ctx.globalAlpha=a;
      ctx.fillStyle='#ffffff';
      const r=0.5+((i*17)%3)*0.5;
      ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
    }
    // distant planet
    ctx.globalAlpha=0.12;
    ctx.fillStyle='#A855F7';
    ctx.beginPath();ctx.arc(340,80,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4FC8FF';
    ctx.globalAlpha=0.06;
    ctx.beginPath();ctx.arc(340,80,40,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawItem(item){
  const spr=SPRITE_CANVASES[item.sprite];
  if(!spr)return;
  const sz=item.size;
  ctx.save();
  ctx.translate(item.x, item.y);
  ctx.rotate(item.rot);
  ctx.imageSmoothingEnabled=false;
  if(item.special){
    ctx.beginPath();ctx.arc(0,0,sz/2+4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,214,0,0.18)';ctx.fill();
  }
  ctx.drawImage(spr, -sz/2, -sz/2, sz, sz);
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawBunny(){
  const bx=basket.x-basket.w/2;

}

function checkCollision(item){
  const bx=basket.x-basket.w/2+6, bRight=basket.x+basket.w/2-6;
  const by=basket.y-basket.h/2+4;
  if(item.x>bx&&item.x<bRight&&item.y>by-8&&item.y<by+24){
    return true;
  }
  return false;
}

function update(){
  if(state!=='playing')return;
  frame++;
  blink++;

  const cfg=getLevelCfg();

  // Move basket
  const spd=basket.speed+(level-1)*0.5;
  if(keys.left) basket.x=Math.max(basket.w/2,basket.x-spd);
  if(keys.right) basket.x=Math.min(W-basket.w/2,basket.x+spd);

  // Spawn
  if(frame%cfg.spawnRate===0) spawnItem();

  // Update items
  items.forEach(item=>{
    item.y+=item.vy;
    item.x+=item.vx;
    item.rot+=item.rotv;
    if(item.x<12||item.x>W-12) item.vx*=-1;
  });

  // Collision
  items=items.filter(item=>{
    if(checkCollision(item)){
      if(item.bomb){
        lives--;
        combo=1;
        spawnParticles(item.x,item.y,'#FF3D00',12);
        if(lives<=0){endGame(false);}
      } else {
        const earned=item.pts*combo;
        score+=earned;
        caught++;
        if(combo>1) showComboPop(basket.x,basket.y-30,'x'+combo+' COMBO!');
        combo=Math.min(combo+1,8);
        spawnParticles(item.x,item.y,item.color,10);
        // Level up check
        if(caught>=cfg.catchNeeded){
          if(level>=8){ endGame(true); return false; }
          level++;
          caught=0;
          items=[];
          showLevelAnnounce(level);
        }
      }
      updateHUD();
      return false;
    }
    if(item.y>H+30){
      if(!item.bomb){ combo=1; updateHUD(); }
      return false;
    }
    return true;
  });

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.03;
    p.size*=0.97;
  });
  particles=particles.filter(p=>p.life>0);

  if(score>highScore) highScore=score;
}

function drawHUD(){
  // In-canvas info
  // Progress bar text
  const cfg=getLevelCfg();
  ctx.save();
  ctx.font='bold 11px Nunito, sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.textAlign='right';
  ctx.fillText(caught+'/'+cfg.catchNeeded+' '+cfg.name, W-10, H-14);
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawParticles();
  items.forEach(drawItem);
  drawBunny();
  drawBasket();
  drawHUD();
}

    title.style.color='#FFE066';
    title.style.fontSize='14px';
    desc.innerHTML=`Final Score: <b style="color:#FFE066;font-family:'Press Start 2P',monospace">${score}</b><br><br>Lovey Bunny is so happy!<br>You caught all the fruit! 🥕`;
  } else if(lives<=0){
    title.innerHTML='💔 GAME OVER';
    title.style.color='#FF8FAB';
    title.style.fontSize='16px';
    desc.innerHTML=`Score: <b style="color:#FFE066;font-family:'Press Start 2P',monospace">${score}</b><br><br>Lovey Bunny dropped the basket...<br>Try again?`;
  }
  btn.textContent='PLAY AGAIN';
  document.getElementById('returnBtn').style.display='inline-block';
  overlay.style.background='rgba(10,4,30,0.88)';
  overlay.style.display='flex';
  legend.style.display='none';
}

function loop(){
  update();
  draw();
  if(state==='playing') requestAnimationFrame(loop);
}

// Keyboard shortcut to start
document.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&state==='idle') startGame();
});

// Draw the gold title-card that fills the canvas on the start screen
function drawTitleCard(){
  ctx.clearRect(0,0,W,H);
  // Sky backdrop (level 1 colours)
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1a2a6c');sky.addColorStop(.5,'#2d5a8e');sky.addColorStop(1,'#b21f1f');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // Subtle star-speckle on the backdrop
  ctx.save();
  for(let i=0;i<60;i++){
    const sx=(i*137.508)%W, sy=(i*93.719)%H;
    ctx.globalAlpha=0.25+((i*7)%10)*0.05;
    ctx.fillStyle='#fff';
    ctx.fillRect(sx,sy,1+(i%2),1+(i%3));
  }
  ctx.restore();

  // --- Gold card ---
  const cx=W/2, pad=28;
  const cardX=pad, cardY=pad, cardW=W-pad*2, cardH=H-pad*2, cardR=22;

  // Drop shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=32;ctx.shadowOffsetY=8;
  ctx.beginPath();
  ctx.roundRect(cardX,cardY,cardW,cardH,cardR);
  ctx.fillStyle='#1a1000';ctx.fill();
  ctx.restore();

  // Card body — deep rich gradient, dark gold
  const bodyGrd=ctx.createLinearGradient(cardX,cardY,cardX,cardY+cardH);
  bodyGrd.addColorStop(0,'#2a1d00');
  bodyGrd.addColorStop(0.35,'#1c1200');
  bodyGrd.addColorStop(0.7,'#241800');
  bodyGrd.addColorStop(1,'#0e0900');
  ctx.beginPath();
  ctx.roundRect(cardX,cardY,cardW,cardH,cardR);
  ctx.fillStyle=bodyGrd;ctx.fill();

  // Outer gold border
  const borderGrd=ctx.createLinearGradient(cardX,cardY,cardX+cardW,cardY+cardH);
  borderGrd.addColorStop(0,'#FFD700');
  borderGrd.addColorStop(0.25,'#FFF0A0');
  borderGrd.addColorStop(0.5,'#B8860B');
  borderGrd.addColorStop(0.75,'#FFD700');
  borderGrd.addColorStop(1,'#DAA520');
  ctx.beginPath();
  ctx.roundRect(cardX,cardY,cardW,cardH,cardR);
  ctx.strokeStyle=borderGrd;ctx.lineWidth=3.5;ctx.stroke();

  // Inner thin border
  ctx.beginPath();
  ctx.roundRect(cardX+8,cardY+8,cardW-16,cardH-16,cardR-6);
  ctx.strokeStyle='rgba(255,215,0,0.25)';ctx.lineWidth=1;ctx.stroke();

  // Shimmer band across the card
  const shimGrd=ctx.createLinearGradient(cardX,cardY+60,cardX+cardW,cardY+200);
  shimGrd.addColorStop(0,'rgba(255,240,150,0)');
  shimGrd.addColorStop(0.4,'rgba(255,240,150,0.04)');
  shimGrd.addColorStop(0.5,'rgba(255,240,150,0.09)');
  shimGrd.addColorStop(0.6,'rgba(255,240,150,0.04)');
  shimGrd.addColorStop(1,'rgba(255,240,150,0)');
  ctx.save();
  ctx.beginPath();ctx.roundRect(cardX+2,cardY+2,cardW-4,cardH-4,cardR-2);
  ctx.clip();
  ctx.fillStyle=shimGrd;ctx.fillRect(cardX,cardY,cardW,cardH);
  ctx.restore();

  // --- Corner ornaments (drawn with pixel squares for pixel-art feel) ---
  function drawOrnament(ox,oy,flipX,flipY){
    ctx.save();
    ctx.translate(ox,oy);
    ctx.scale(flipX,flipY);
    const G='#FFD700', G2='#DAA520', G3='#FFF0A0';
    const dots=[
      [0,0,5,5,G],[7,0,3,3,G2],[0,7,3,3,G2],
      [11,0,2,2,G3],[0,11,2,2,G3],
      [5,5,3,3,G3],[9,3,2,2,G],[3,9,2,2,G],
      [13,2,2,2,G2],[2,13,2,2,G2],
    ];
    dots.forEach(([x,y,w,h,c])=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h);});
    ctx.restore();
  }
  const m=16; // margin from card edge
  drawOrnament(cardX+m,      cardY+m,       1,  1);
  drawOrnament(cardX+cardW-m,cardY+m,      -1,  1);
  drawOrnament(cardX+m,      cardY+cardH-m, 1, -1);
  drawOrnament(cardX+cardW-m,cardY+cardH-m,-1, -1);

  // --- Horizontal rule lines ---
  function goldRule(y,w=cardW-80){
    const rx=cx-w/2;
    const gr=ctx.createLinearGradient(rx,y,rx+w,y);
    gr.addColorStop(0,'rgba(255,215,0,0)');
    gr.addColorStop(0.2,'rgba(255,215,0,0.7)');
    gr.addColorStop(0.5,'rgba(255,240,120,1)');
    gr.addColorStop(0.8,'rgba(255,215,0,0.7)');
    gr.addColorStop(1,'rgba(255,215,0,0)');
    ctx.strokeStyle=gr;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(rx,y);ctx.lineTo(rx+w,y);ctx.stroke();
  }
  goldRule(cardY+52);
  goldRule(cardY+cardH-52);

  // --- Diamond centre-top ornament ---
  ctx.save();
  ctx.translate(cx,cardY+52);
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(5,0);ctx.lineTo(0,7);ctx.lineTo(-5,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#FFF0A0';
  ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(3,0);ctx.lineTo(0,4);ctx.lineTo(-3,0);ctx.closePath();ctx.fill();
  ctx.restore();

  // --- "HIGH SCORE" badge at top ---
  const hs=typeof highScore!=='undefined'?highScore:0;
  if(hs>0){
    ctx.font='bold 9px "Press Start 2P", monospace';
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,215,0,0.5)';
    ctx.fillText('BEST: '+hs, cx, cardY+46);
  }

  // --- Decorative dot-grid pattern (subtle) ---
  ctx.save();ctx.globalAlpha=0.04;ctx.fillStyle='#FFD700';
  for(let dy=cardY+65;dy<cardY+cardH-65;dy+=14){
    for(let dx=cardX+24;dx<cardX+cardW-24;dx+=14){
      ctx.fillRect(dx,dy,2,2);
    }
  }
  ctx.restore();
}

// Draw initial static scene
(function initDraw(){
  drawTitleCard();
})();

// --- Idle animation on the overlay start screen ---
(function startIdleAnim(){
  const idleC=document.getElementById('idleCanvas');
  if(!idleC)return;
  const idleCtx=idleC.getContext('2d');
  idleCtx.imageSmoothingEnabled=false;

  // Pre-render bunny to a 64x64 offscreen canvas
  const bunnyOff=document.createElement('canvas');
  bunnyOff.width=64;bunnyOff.height=64;
  const bOffCtx=bunnyOff.getContext('2d');
  bOffCtx.imageSmoothingEnabled=false;
  bunnyPixels.forEach((row,y)=>row.forEach((c,x)=>{
    if(c===T||c==='rgba(0,0,0,0)')return;
    bOffCtx.fillStyle=c;
    bOffCtx.fillRect(x*2,y*2,2,2);
  }));

  let f=0;
  function animIdle(){
    idleCtx.clearRect(0,0,96,96);
    // Gentle breathe: body shifts down 1px every other breath cycle
    const breathe=Math.sin(f*0.06);
    const offsetY=breathe>0?0:1;
    // Draw bunny centered, slightly bobbing
    const drawY=16+Math.floor(breathe*1.5);
    idleCtx.drawImage(bunnyOff,0,0,64,64-offsetY,16,drawY,64,64-offsetY);
    // Blink every ~3 seconds
    if(f%180<5){
      idleCtx.fillStyle=BK;
      idleCtx.fillRect(16+22,drawY+20,4,2);
      idleCtx.fillRect(16+36,drawY+20,4,2);
    }
    // Ear wiggle: tiny horizontal offset on left ear tip area
    const earWiggle=Math.floor(Math.sin(f*0.04)*1.2);
    if(Math.abs(earWiggle)>0){
      idleCtx.fillStyle=WH;
      idleCtx.fillRect(16+14+earWiggle,drawY,4,4);
    }
    f++;
    if(document.getElementById('idleCanvas')) requestAnimationFrame(animIdle);
  }
  animIdle();
})();
</script>
