<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#06060f">
  <meta name="description" content="2ez.sol — HTML games, play instantly in browser">
  <title>2ez.sol.site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:         #06060f;
      --bg2:        #0d0d20;
      --glass:      rgba(255,255,255,0.06);
      --glass-b:    rgba(255,255,255,0.11);
      --text:       #ffffff;
      --text-dim:   rgba(255,255,255,0.5);
      --text-faint: rgba(255,255,255,0.28);
      --accent:     #9b6dff;
      --safe-t:     env(safe-area-inset-top,    0px);
      --safe-b:     env(safe-area-inset-bottom, 0px);
      --safe-l:     env(safe-area-inset-left,   0px);
      --safe-r:     env(safe-area-inset-right,  0px);
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rubik', sans-serif;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    /* ─── WALLPAPER ────────────────────────────── */
    .wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    /* Grain texture overlay */
    .wallpaper::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.045'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.6;
    }

    /* Stars */
    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at  8% 12%, rgba(255,255,255,.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 38%, rgba(255,255,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 48%  8%, rgba(255,255,255,.65) 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 28%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 83% 55%, rgba(255,255,255,.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 13% 72%, rgba(255,255,255,.40) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 84%, rgba(255,255,255,.30) 0%, transparent 100%),
        radial-gradient(1px 1px at 57% 67%, rgba(255,255,255,.50) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 88%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 33% 52%, rgba(255,255,255,.60) 0%, transparent 100%),
        radial-gradient(1px 1px at 76% 14%, rgba(255,255,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at  4% 47%, rgba(255,255,255,.38) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 43%, rgba(255,255,255,.28) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 93%, rgba(255,255,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 22%, rgba(255,255,255,.42) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 77%, rgba(255,255,255,.33) 0%, transparent 100%),
        radial-gradient(2px 2px at 44% 31%, rgba(200,180,255,.50) 0%, transparent 100%),
        radial-gradient(1px 1px at 86% 62%, rgba(180,220,255,.40) 0%, transparent 100%);
    }

    /* Nebula orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
    }
    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(80,30,180,.38), transparent 70%);
      top: -220px; left: -180px;
      animation: orb-drift-1 20s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(15,60,130,.42), transparent 70%);
      bottom: -150px; right: -130px;
      animation: orb-drift-2 25s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(160,30,120,.28), transparent 70%);
      top: 38%; left: 55%;
      transform: translate(-50%, -50%);
      animation: orb-drift-3 17s ease-in-out infinite alternate;
    }

    @keyframes orb-drift-1 { to { transform: translate(50px, 35px); } }
    @keyframes orb-drift-2 { to { transform: translate(-40px, -55px); } }
    @keyframes orb-drift-3 { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-50%,-50%) scale(1.4); } }

    /* ─── LAYOUT ───────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: calc(var(--safe-t) + 4px);
      padding-bottom: calc(var(--safe-b) + 56px);
      padding-left: calc(var(--safe-l) + 18px);
      padding-right: calc(var(--safe-r) + 18px);
      max-width: 740px;
      margin: 0 auto;
    }

    /* ─── STATUS BAR ───────────────────────────── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 2px 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      flex-shrink: 0;
      user-select: none;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-right svg {
      display: block;
    }

    /* ─── HEADER ───────────────────────────────── */
    .header {
      padding: 18px 2px 0;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 10vw, 4rem);
      line-height: 0.95;
      letter-spacing: -1px;
      color: #fff;
    }

    .logo .dot {
      color: var(--accent);
      text-shadow: 0 0 30px rgba(155,109,255,0.7), 0 0 60px rgba(155,109,255,0.35);
    }

    .logo .games-word {
      background: linear-gradient(125deg, #c4aaff 10%, #80c8ff 90%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-sub {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(155,109,255,0.18);
      border: 1px solid rgba(155,109,255,0.35);
      color: #c4aaff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px 2px 6px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .pill-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #9b6dff;
      box-shadow: 0 0 6px #9b6dff;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ─── SECTION LABEL ────────────────────────── */
    .section-header {
      margin-top: 28px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-faint);
    }

    /* ─── DIVIDER ──────────────────────────────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-b) 30%, var(--glass-b) 70%, transparent);
      margin: 12px 0 16px;
      flex-shrink: 0;
    }

    /* ─── APPS GRID ────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px 8px;
    }

    @media (min-width: 400px) {
      .apps-grid { grid-template-columns: repeat(5, 1fr); }
    }
    @media (min-width: 520px) {
      .apps-grid { grid-template-columns: repeat(6, 1fr); gap: 14px 12px; }
    }
    @media (min-width: 680px) {
      .apps-grid { grid-template-columns: repeat(7, 1fr); gap: 16px 14px; }
    }

    /* ─── APP ICON ─────────────────────────────── */
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: inherit;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
      opacity: 0;
      animation: icon-in 0.45s cubic-bezier(.34,1.4,.64,1) forwards;
    }

    @keyframes icon-in {
      from { opacity: 0; transform: scale(0.6) translateY(8px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);   }
    }

    .icon-face {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 22.5%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s cubic-bezier(.34,1.4,.64,1), box-shadow 0.18s ease;
      box-shadow:
        0 4px 14px rgba(0,0,0,.55),
        0 1px  4px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.18);
      cursor: pointer;
    }

    /* Specular gloss */
    .icon-face::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg,
        rgba(255,255,255,.28) 0%,
        rgba(255,255,255,.08) 40%,
        transparent 65%
      );
      border-radius: inherit;
      pointer-events: none;
      z-index: 2;
    }

    /* Shimmer sweep */
    .icon-face::after {
      content: '';
      position: absolute;
      top: 0; left: -80%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
      transform: skewX(-15deg);
      z-index: 3;
      pointer-events: none;
    }

    .app-item:hover .icon-face {
      transform: scale(1.08) translateY(-3px);
      box-shadow:
        0 10px 28px rgba(0,0,0,.6),
        0 3px  8px  rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.22);
    }

    .app-item:hover .icon-face::after {
      animation: shimmer-sweep .5s ease forwards;
    }

    @keyframes shimmer-sweep {
      from { left: -80%; }
      to   { left: 140%; }
    }

    .app-item:active .icon-face {
      transform: scale(0.88);
      transition-duration: 0.09s;
    }

    .icon-emoji {
      font-size: clamp(1.6rem, 5.5vw, 2rem);
      line-height: 1;
      position: relative;
      z-index: 1;
      display: block;
      pointer-events: none;
    }

    @media (min-width: 520px) {
      .icon-emoji { font-size: 2.1rem; }
    }

    .icon-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-align: center;
      color: rgba(255,255,255,.88);
      line-height: 1.25;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
      text-shadow: 0 1px 4px rgba(0,0,0,.9), 0 0 8px rgba(0,0,0,.6);
    }

    @media (min-width: 520px) {
      .icon-label { font-size: 0.68rem; }
    }

    /* ─── HOME INDICATOR ───────────────────────── */
    .home-indicator {
      position: fixed;
      bottom: calc(6px + var(--safe-b));
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.3);
      pointer-events: none;
    }

    /* ─── FROSTED DOCK (OPTIONAL) ──────────────── */
    /* Visible on wider screens as a subtle footer */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(40px + var(--safe-b));
      background: rgba(10,10,25,.6);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-top: 1px solid rgba(255,255,255,.07);
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: var(--safe-b);
      pointer-events: none;
    }

    .footer-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-faint);
      letter-spacing: 1px;
      pointer-events: auto;
    }

    .footer-tag a {
      color: rgba(155,109,255,.7);
      text-decoration: none;
    }

    .footer-tag a:hover { color: #c4aaff; }

  </style>
</head>
<body>

  <!-- Wallpaper -->
  <div class="wallpaper" aria-hidden="true">
    <div class="stars"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Main shell -->
  <div class="shell">

    <!-- Status bar -->
    <div class="status-bar" aria-hidden="true">
      <span id="clock">12:00</span>
      <div class="status-right">
        <!-- Signal bars -->
        <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
          <rect x="0"  y="8" width="2.5" height="4"  rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="3.5" y="5.5" width="2.5" height="6.5" rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="7"  y="3"   width="2.5" height="9"   rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="10.5" y="0" width="2.5" height="12"  rx="1" fill="currentColor" opacity="0.9"/>
        </svg>
        <!-- Wifi -->
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <circle cx="7.5" cy="9.5" r="1.3" fill="currentColor"/>
          <path d="M4.5 7C5.6 5.9 6.9 5.3 7.5 5.3s1.9.6 3 1.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".85"/>
          <path d="M2 4.2A8.1 8.1 0 0 1 7.5 2a8.1 8.1 0 0 1 5.5 2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".6"/>
        </svg>
        <!-- Battery -->
        <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
          <rect x=".5" y=".5" width="18" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".65"/>
          <rect x="2" y="2" width="13" height="7" rx="1.5" fill="currentColor" opacity=".85"/>
          <rect x="19" y="3.5" width="2.5" height="4" rx="1.25" fill="currentColor" opacity=".45"/>
        </svg>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <h1 class="logo">2ez<span class="dot">.</span><span class="games-word">sol</span></h1>
      <div class="header-meta">
        <span class="header-sub">Play instantly in your browser</span>
        <span class="pill">
          <span class="pill-dot"></span>
          <span id="game-count">13</span>&nbsp;games online
        </span>
      </div>
    </header>

    <!-- Grid section -->
    <div class="section-header">
      <span class="section-label">All Games</span>
    </div>
    <div class="divider"></div>

    <div class="apps-grid" id="apps-grid">
      <!-- Populated by JS -->
    </div>

  </div><!-- /shell -->

  <!-- Frosted bottom bar -->
  <div class="footer-bar" aria-hidden="true">
    <span class="footer-tag">2ez.sol.site</span>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator" aria-hidden="true"></div>


  <script>
    // ═══════════════════════════════════════════════
    // GAMES_DATA_START
    const GAMES = [
      { folder: "americanDinner", title: "American Dinner Slots", emoji: "🎰", g1: "#eab308", g2: "#ea580c" },
      { folder: "brickbreaker", title: "BRICKBREAKER", emoji: "🧱", g1: "#0891b2", g2: "#2563eb" },
      { folder: "candyDoom", title: "DOOM", emoji: "🍬", g1: "#e879f9", g2: "#7c3aed" },
      { folder: "coinToss", title: "Coin Toss", emoji: "🪙", g1: "#d97706", g2: "#92400e" },
      { folder: "diskGolf", title: "Disk Golf", emoji: "🏆", g1: "#10b981", g2: "#065f46" },
      { folder: "gemcrush", title: "Gemcrush", emoji: "💎", g1: "#7c3aed", g2: "#be185d" },
      { folder: "gumballMachine", title: "Gumball Machine", emoji: "🎱", g1: "#1d4ed8", g2: "#0f172a" },
      { folder: "loveyBunnysFruitCatch", title: "Lovey Bunny's Fruit Catch!", emoji: "🐰", g1: "#f43f5e", g2: "#c026d3" },
      { folder: "lucky7s", title: "Lucky 7s Slot Machine", emoji: "🎰", g1: "#eab308", g2: "#ea580c" },
      { folder: "match3Ignition", title: "Match 3 Ignition", emoji: "💎", g1: "#7c3aed", g2: "#be185d" },
      { folder: "solitare", title: "Solitaire", emoji: "🃏", g1: "#16a34a", g2: "#14532d" },
      { folder: "sweetsAndTreats", title: "Sweets & Treats Slots", emoji: "🎰", g1: "#eab308", g2: "#ea580c" },
    ];
    // GAMES_DATA_END
    // ═══════════════════════════════════════════════

    // ── Render icons ────────────────────────────────
    const grid = document.getElementById('apps-grid');

    GAMES.forEach((game, i) => {
      const a = document.createElement('a');
      a.href = `./${game.folder}`;
      a.className = 'app-item';
      a.style.animationDelay = `${i * 38}ms`;
      a.setAttribute('aria-label', game.title);

      const face = document.createElement('div');
      face.className = 'icon-face';
      face.style.background = `linear-gradient(145deg, ${game.g1}, ${game.g2})`;

      const em = document.createElement('span');
      em.className = 'icon-emoji';
      em.setAttribute('aria-hidden', 'true');
      em.textContent = game.emoji;

      const lbl = document.createElement('span');
      lbl.className = 'icon-label';
      lbl.textContent = game.title;

      face.appendChild(em);
      a.appendChild(face);
      a.appendChild(lbl);
      grid.appendChild(a);
    });

    document.getElementById('game-count').textContent = GAMES.length;

    // ── Live clock ──────────────────────────────────
    function tick() {
      const now  = new Date();
      const h    = now.getHours() % 12 || 12;
      const m    = String(now.getMinutes()).padStart(2, '0');
      const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
    }
    tick();
    setInterval(tick, 10000);

    // ── Active press bounce ─────────────────────────
    document.querySelectorAll('.app-item').forEach(el => {
      el.addEventListener('touchstart', () => {}, { passive: true }); // enable :active on iOS
    });
  </script>
</body>
</html>
