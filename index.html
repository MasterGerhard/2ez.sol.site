  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── TOKENS ─────────────────────────────────── */
    :root {
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --bg:         #0b0908;
      --surface:    #181410;
      --text:       #e0d7ca;
      --text-dim:   rgba(224,215,202,0.52);
      --text-faint: rgba(224,215,202,0.3);
      --accent:     #9b6dff;
      --safe-t: env(safe-area-inset-top,    0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
      --safe-r: env(safe-area-inset-right,  0px);
    }

    /* ── BASE ────────────────────────────────────── */
    html { height: 100%; background: var(--bg); }

    body {
      min-height: 100dvh;
      font-family: var(--font);
      color: var(--text);
      overflow-x: hidden;
      overscroll-behavior: none;
      /* Dark leather crosshatch grain */
      background-color: var(--bg);
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.022) 0, rgba(255,255,255,0.022) 1px,
          transparent 1px, transparent 4px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.016) 0, rgba(255,255,255,0.016) 1px,
          transparent 1px, transparent 4px
        ),
        repeating-linear-gradient(
          45deg,
          rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px,
          transparent 1px, transparent 8px
        );
    }

    /* Vignette — edges darker, centre slightly lighter */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 38%,
        rgba(28,18,8,0) 0%,
        rgba(0,0,0,0.48) 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ──────────────────────────────────── */
    .shell {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: calc(var(--safe-t) + 4px);
      padding-bottom: calc(var(--safe-b) + 60px);
      padding-left: calc(var(--safe-l) + 18px);
      padding-right: calc(var(--safe-r) + 18px);
      max-width: 740px;
      margin: 0 auto;
    }

    /* ── STATUS BAR ──────────────────────────────── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 2px 4px;
      font-family: var(--font);
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(224,215,202,0.58);
      letter-spacing: 0.2px;
      flex-shrink: 0;
      user-select: none;
      /* Engraved status text */
      text-shadow: 0 1px 0 rgba(255,255,255,0.06), 0 -1px 1px rgba(0,0,0,0.6);
    }

    .status-right { display: flex; align-items: center; gap: 7px; }
    .status-right svg { display: block; }

    /* ── HEADER ──────────────────────────────────── */
    .header {
      padding: 20px 2px 0;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font);
      font-weight: 900;
      font-size: clamp(2.6rem, 10vw, 3.8rem);
      line-height: 0.95;
      letter-spacing: -2px;
      color: #ccc3b3;
      /* Letterpress stamp: thin light edge above, dark shadow below */
      text-shadow:
        0  1px 0   rgba(255,255,255,0.09),
        0 -1px 0   rgba(0,0,0,0.55),
        0  2px 6px rgba(0,0,0,0.55),
        0  4px 12px rgba(0,0,0,0.3);
    }

    .logo .dot {
      color: #9b6dff;
      text-shadow:
        0  1px 0   rgba(255,255,255,0.1),
        0 -1px 0   rgba(0,0,0,0.6),
        0  2px 6px rgba(0,0,0,0.6),
        0  0  18px rgba(155,109,255,0.45);
    }

    .logo .games-word {
      color: #d5ccbc;
      text-shadow:
        0  1px 0   rgba(255,255,255,0.09),
        0 -1px 0   rgba(0,0,0,0.55),
        0  2px 6px rgba(0,0,0,0.5);
    }

    .header-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-sub {
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.2px;
    }

    /* Inset badge — pressed into the surface */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(0,0,0,0.5);
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.55),
        0 1px 0 rgba(255,255,255,0.07);
      color: rgba(155,109,255,0.88);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px 3px 6px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .pill-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #9b6dff;
      box-shadow: 0 0 5px rgba(155,109,255,0.8);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ── SECTION LABEL ───────────────────────────── */
    .section-header {
      margin-top: 26px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-faint);
      /* Embossed label */
      text-shadow: 0 1px 0 rgba(255,255,255,0.06), 0 -1px 0 rgba(0,0,0,0.4);
    }

    /* ── DIVIDER — physical inset groove ─────────── */
    .divider {
      margin: 10px 0 14px;
      flex-shrink: 0;
      height: 0;
      border: none;
      border-top: 1px solid rgba(0,0,0,0.6);
      box-shadow: 0 1px 0 rgba(255,255,255,0.06);
    }

    /* ── APPS GRID ───────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px 9px;   /* +15% from original 10px / 8px */
    }

    @media (min-width: 400px) {
      .apps-grid { grid-template-columns: repeat(5, 1fr); }
    }
    @media (min-width: 520px) {
      .apps-grid { grid-template-columns: repeat(6, 1fr); gap: 16px 14px; }
    }
    @media (min-width: 680px) {
      .apps-grid { grid-template-columns: repeat(7, 1fr); gap: 18px 16px; }
    }

    /* ── APP ICON ────────────────────────────────── */
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      color: inherit;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
      opacity: 0;
      animation: icon-in 0.4s cubic-bezier(.34,1.4,.64,1) forwards;
    }

    @keyframes icon-in {
      from { opacity: 0; transform: scale(0.72) translateY(6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    .icon-face {
      width: 85%;          /* ← 15% smaller than the cell */
      aspect-ratio: 1;
      border-radius: 22.5%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(.34,1.3,.64,1), box-shadow 0.15s ease;

      /* Physical border system */
      border: 1px solid rgba(0,0,0,0.5);
      outline: 1px solid rgba(255,255,255,0.07);
      outline-offset: -1px;

      /* Skeuomorphic shadow stack */
      box-shadow:
        /* Top-edge highlight: simulates overhead light */
        inset 0  1px 0   rgba(255,255,255,0.28),
        /* Left-edge subtle highlight */
        inset 1px 0  0   rgba(255,255,255,0.09),
        /* Bottom inner shadow: surface depth */
        inset 0 -3px 6px rgba(0,0,0,0.38),
        /* Contact shadow */
        0 2px 4px  rgba(0,0,0,0.45),
        /* Key shadow */
        0 6px 14px rgba(0,0,0,0.5),
        /* Ambient/spread shadow */
        0 14px 28px rgba(0,0,0,0.28);
    }

    /* ── Top-half dome gloss: the iOS-era skeuomorphic signature ── */
    .icon-face::before {
      content: '';
      position: absolute;
      top: 3%; left: 9%; right: 9%;
      height: 44%;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.40) 0%,
        rgba(255,255,255,0.12) 55%,
        rgba(255,255,255,0.00) 100%
      );
      /* Lens-curve shape */
      border-radius: 0 0 55% 55% / 0 0 100% 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Bottom shadow — simulates concave base ── */
    .icon-face::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28%;
      background: linear-gradient(0deg,
        rgba(0,0,0,0.28) 0%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Hover: lift off surface */
    .app-item:hover .icon-face {
      transform: scale(1.07) translateY(-4px);
      box-shadow:
        inset 0  1px 0   rgba(255,255,255,0.32),
        inset 1px 0  0   rgba(255,255,255,0.1),
        inset 0 -3px 6px rgba(0,0,0,0.32),
        0 4px  8px  rgba(0,0,0,0.5),
        0 12px 26px rgba(0,0,0,0.55),
        0 22px 40px rgba(0,0,0,0.28);
    }

    /* Active/press: icon pushed down into surface */
    .app-item:active .icon-face {
      transform: scale(0.91);
      transition-duration: 0.07s;
      box-shadow:
        /* Inverted: shadows now go inward — pressed look */
        inset 0  3px 8px rgba(0,0,0,0.55),
        inset 0 -1px 0   rgba(255,255,255,0.09),
        0 1px 3px rgba(0,0,0,0.35);
    }

    .icon-emoji {
      font-size: clamp(1.45rem, 4.8vw, 1.85rem);
      line-height: 1;
      position: relative;
      z-index: 1;
      display: block;
      pointer-events: none;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.55));
    }

    @media (min-width: 520px) {
      .icon-emoji { font-size: 1.85rem; }
    }

    .icon-label {
      font-size: 0.62rem;
      font-weight: 600;
      text-align: center;
      color: rgba(224,215,202,0.82);
      line-height: 1.25;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
      /* Stamped into the leather */
      text-shadow: 0 1px 3px rgba(0,0,0,0.95);
      letter-spacing: 0.1px;
    }

    @media (min-width: 520px) {
      .icon-label { font-size: 0.67rem; }
    }

    /* ── HOME INDICATOR ──────────────────────────── */
    .home-indicator {
      position: fixed;
      bottom: calc(6px + var(--safe-b));
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 4px;
      border-radius: 2px;
      /* Inset pill — recessed into the chassis */
      background: rgba(255,255,255,0.16);
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.55),
        0 1px 0 rgba(255,255,255,0.07);
      pointer-events: none;
    }

    /* ── FOOTER BAR — dark anodised metal dock ───── */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(40px + var(--safe-b));
      padding-bottom: var(--safe-b);
      /* Machined aluminium gradient */
      background: linear-gradient(180deg, #1e1a16 0%, #120f0c 100%);
      border-top: 1px solid rgba(0,0,0,0.75);
      box-shadow:
        0 -1px 0  rgba(255,255,255,0.07),
        0 -8px 24px rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .footer-tag {
      font-family: var(--font);
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 1px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.6);
    }

    .footer-tag a {
      color: rgba(155,109,255,0.6);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-tag a:hover { color: rgba(155,109,255,0.9); }

  </style>

</head>
<body>

  <!-- Main shell -->
  <div class="shell">

    <!-- Status bar -->
    <div class="status-bar" aria-hidden="true">
      <span id="clock">12:00</span>
      <div class="status-right">
        <!-- Signal bars -->
        <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
          <rect x="0"  y="8" width="2.5" height="4"  rx="1" fill="currentColor" opacity="0.9"/>
          <rect x="3.5" y="5.5" width="2.5" height="6.5" rx="1" fill="currentColor" opacity="0.9"/>

        </svg>
        <!-- Wifi -->
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
          <circle cx="7.5" cy="9.5" r="1.3" fill="currentColor"/>
          <path d="M4.5 7C5.6 5.9 6.9 5.3 7.5 5.3s1.9.6 3 1.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".85"/>
          <path d="M2 4.2A8.1 8.1 0 0 1 7.5 2a8.1 8.1 0 0 1 5.5 2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".6"/>
        </svg>
        <!-- Battery -->
        <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
          <rect x=".5" y=".5" width="18" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".65"/>
          <rect x="2" y="2" width="13" height="7" rx="1.5" fill="currentColor" opacity=".85"/>
          <rect x="19" y="3.5" width="2.5" height="4" rx="1.25" fill="currentColor" opacity=".45"/>
        </svg>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <h1 class="logo">2ez<span class="dot">.</span><span class="games-word">sol</span></h1>
      <div class="header-meta">
        <span class="header-sub">Play instantly in your browser</span>
        <span class="pill">
          <span class="pill-dot"></span>
          <span id="game-count">13</span>&nbsp;games online
        </span>
      </div>
    </header>

    <!-- Grid section -->
    <div class="section-header">
      <span class="section-label">All Games</span>
    </div>
    <div class="divider"></div>

    <div class="apps-grid" id="apps-grid">
      <!-- Populated by JS -->
    </div>

  </div><!-- /shell -->

  <!-- Frosted bottom bar -->
  <div class="footer-bar" aria-hidden="true">
    <span class="footer-tag"><a href="https://2ez.sol.site" rel="canonical">2ez.sol.site</a></span>
  </div>

  <!-- Home indicator -->
  <div class="home-indicator" aria-hidden="true"></div>


  <script>
    // ═══════════════════════════════════════════════
    // GAMES_DATA_START
    const GAMES = [
      { folder: "americanDinner", title: "American Dinner Slots", emoji: "🎰", g1: "#eab308", g2: "#ea580c" },
      { folder: "brickbreaker", title: "BRICKBREAKER", emoji: "🧱", g1: "#0891b2", g2: "#2563eb" },
      { folder: "candyDoom", title: "DOOM", emoji: "🍬", g1: "#e879f9", g2: "#7c3aed" },
      { folder: "coinToss", title: "Coin Toss", emoji: "🪙", g1: "#d97706", g2: "#92400e" },
      { folder: "diskGolf", title: "Disk Golf", emoji: "⚡", g1: "#f97316", g2: "#c2410c" },
      { folder: "gemcrush", title: "Gemcrush", emoji: "💎", g1: "#7c3aed", g2: "#be185d" },
      { folder: "gumballMachine", title: "Gumball Machine", emoji: "🎱", g1: "#1d4ed8", g2: "#0f172a" },
      { folder: "loveyBunnysFruitCatch", title: "Lovey Bunny's Fruit Catch!", emoji: "🐰", g1: "#f43f5e", g2: "#c026d3" },
      { folder: "lucky7s", title: "Lucky 7s Slot Machine", emoji: "🎰", g1: "#eab308", g2: "#ea580c" },
      { folder: "match3Ignition", title: "Match 3 Ignition", emoji: "💎", g1: "#7c3aed", g2: "#be185d" },
      { folder: "solitare", title: "Solitaire", emoji: "🃏", g1: "#16a34a", g2: "#14532d" },
      { folder: "sweetsAndTreats", title: "Sweets & Treats Slots", emoji: "🎰", g1: "#eab308", g2: "#ea580c" },
      { folder: "templeIgnition", title: "Temple Ignition", emoji: "🎮", g1: "#6366f1", g2: "#4338ca" },
    ];
    // GAMES_DATA_END
    // ═══════════════════════════════════════════════

    // ── Render icons ────────────────────────────────
    const grid = document.getElementById('apps-grid');

    GAMES.forEach((game, i) => {
      const a = document.createElement('a');
      a.href = `./${game.folder}.html`;
      a.className = 'app-item';
      a.style.animationDelay = `${i * 38}ms`;
      a.setAttribute('aria-label', game.title);

      const face = document.createElement('div');
      face.className = 'icon-face';
      face.style.background = `linear-gradient(145deg, ${game.g1}, ${game.g2})`;

      const em = document.createElement('span');
      em.className = 'icon-emoji';
      em.setAttribute('aria-hidden', 'true');
      em.textContent = game.emoji;

      const lbl = document.createElement('span');
      lbl.className = 'icon-label';
      lbl.textContent = game.title;

      face.appendChild(em);
      a.appendChild(face);
      a.appendChild(lbl);
      grid.appendChild(a);
    });

    document.getElementById('game-count').textContent = GAMES.length;

    // ── Live clock ──────────────────────────────────
    function tick() {
      const now  = new Date();
      const h    = now.getHours() % 12 || 12;
      const m    = String(now.getMinutes()).padStart(2, '0');
      const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
      document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
    }
    tick();
    setInterval(tick, 10000);

    // ── Active press bounce ─────────────────────────
    document.querySelectorAll('.app-item').forEach(el => {
      el.addEventListener('touchstart', () => {}, { passive: true }); // enable :active on iOS
    });
  </script>
</body>
