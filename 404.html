<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Level Not Found | 2ez.sol</title>
<meta name="robots" content="noindex">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root{
    --leather-dark:#1a120b;
    --leather:#2b1d14;
    --leather-light:#3c2a1c;
    --stitch:#8a6a3e;
    --brass:#c9a05a;
    --brass-bright:#e6c47e;
    --cream:#e8d9c0;
    --cabinet-glow:#0f1a12;
    --screen-green:#7fffa0;
    --insert-coin:#c94a36;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    background: var(--leather-dark);
    background-image:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 2px, transparent 2px, transparent 6px);
    color: var(--cream);
    font-family: 'VT323', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .cabinet{
    position:relative;
    width:min(92vw, 560px);
    background: linear-gradient(160deg, var(--leather-light), var(--leather) 60%, var(--leather-dark));
    border-radius:18px;
    padding:28px;
    box-shadow:
      0 0 0 2px rgba(0,0,0,0.6),
      inset 0 0 60px rgba(0,0,0,0.55),
      0 25px 60px rgba(0,0,0,0.6);
    border: 2px solid #14100a;
  }

  /* stitched border */
  .cabinet::before{
    content:"";
    position:absolute;
    inset:10px;
    border-radius:12px;
    border: 2px dashed var(--stitch);
    opacity:0.55;
    pointer-events:none;
  }

  /* brass rivets at corners */
  .rivet{
    position:absolute;
    width:12px; height:12px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--brass-bright), var(--brass) 55%, #6b5226 100%);
    box-shadow: 0 1px 2px rgba(0,0,0,0.7), inset 0 0 2px rgba(0,0,0,0.5);
  }
  .rivet.tl{ top:14px; left:14px; }
  .rivet.tr{ top:14px; right:14px; }
  .rivet.bl{ bottom:14px; left:14px; }
  .rivet.br{ bottom:14px; right:14px; }

  .plate{
    position:relative;
    z-index:1;
    text-align:center;
    font-family:'Press Start 2P', monospace;
    color: var(--brass-bright);
    font-size: clamp(11px, 3vw, 14px);
    letter-spacing:1px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.6);
    margin-bottom:18px;
  }

  .screen{
    position:relative;
    background: var(--cabinet-glow);
    border-radius:8px;
    padding:34px 20px 30px;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.6), 0 0 0 6px #0c0c0c, 0 0 0 8px #2a2a2a;
    overflow:hidden;
  }

  /* scanlines + flicker */
  .screen::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.05) 0px,
      rgba(255,255,255,0.05) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
    animation: flicker 6s infinite;
  }

  .screen::after{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, rgba(127,255,160,0.08), transparent 70%);
    pointer-events:none;
  }

  @keyframes flicker{
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.85; }
    94% { opacity: 1; }
    97% { opacity: 0.9; }
  }

  .code{
    font-family:'Press Start 2P', monospace;
    color: var(--insert-coin);
    font-size: clamp(38px, 12vw, 64px);
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(201,74,54,0.7), 0 0 18px rgba(201,74,54,0.4);
    margin-bottom: 14px;
  }

  .headline{
    font-family:'Press Start 2P', monospace;
    color: var(--screen-green);
    font-size: clamp(13px, 3.6vw, 18px);
    letter-spacing:1px;
    text-shadow: 0 0 6px rgba(127,255,160,0.6);
    margin-bottom: 16px;
  }

  .sub{
    font-size: clamp(16px, 4vw, 20px);
    color: rgba(232,217,192,0.85);
    line-height:1.5;
    margin-bottom: 22px;
  }

  .sub span{ color: var(--brass-bright); }

  .btn-row{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
  }

  .btn{
    display:inline-block;
    font-family:'Press Start 2P', monospace;
    font-size: clamp(10px, 2.6vw, 12px);
    color: var(--leather-dark);
    background: linear-gradient(180deg, var(--brass-bright), var(--brass));
    border: 2px solid #6b5226;
    border-radius: 6px;
    padding: 12px 18px;
    text-decoration:none;
    letter-spacing:1px;
    box-shadow: 0 4px 0 #5c4520, 0 6px 10px rgba(0,0,0,0.5);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .btn:hover{
    transform: translateY(2px);
    box-shadow: 0 2px 0 #5c4520, 0 4px 8px rgba(0,0,0,0.5);
  }
  .btn:active{
    transform: translateY(4px);
    box-shadow: 0 0 0 #5c4520;
  }

  .insert{
    margin-top:18px;
    font-family:'Press Start 2P', monospace;
    font-size: clamp(9px, 2.4vw, 11px);
    color: var(--insert-coin);
    letter-spacing:1px;
    animation: blink 1.1s steps(2, start) infinite;
  }

  @keyframes blink{ to { visibility:hidden; } }

  @media (prefers-reduced-motion: reduce){
    .screen::before{ animation:none; }
    .insert{ animation:none; }
  }
</style>
</head>
<body>

  <div class="cabinet">
    <span class="rivet tl"></span>
    <span class="rivet tr"></span>
    <span class="rivet bl"></span>
    <span class="rivet br"></span>

    <div class="plate">2EZ.SOL ARCADE CABINET</div>

    <div class="screen">
      <div class="code">404</div>
      <div class="headline">LEVEL NOT FOUND</div>
      <div class="sub">
        That cartridge isn't in the cabinet.<br>
        The page got lost between levels — <span>let's get you back to the lobby.</span>
      </div>
      <div class="btn-row">
        <a class="btn" href="/">HOME BASE</a>
        <a class="btn" href="/#games">BROWSE GAMES</a>
      </div>
      <div class="insert">PRESS START TO CONTINUE</div>
    </div>
  </div>

</body>
</html>
